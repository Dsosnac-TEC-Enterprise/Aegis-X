<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aegis-X | Web Command Center</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --p: #00ff41; --bg: #050505; --s: #111; --sec: #ff0055; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 220px; border-right: 1px solid var(--p); padding: 20px; background: var(--s); }
        .view { flex: 1; padding: 25px; display: none; overflow-y: auto; }
        .active { display: flex; flex-direction: column; }
        .btn { display: block; width: 100%; padding: 12px; margin: 8px 0; background: none; color: var(--p); border: 1px solid var(--p); cursor: pointer; text-align: left; font-weight: bold; }
        .btn:hover, .btn.active-btn { background: var(--p); color: #000; box-shadow: 0 0 10px var(--p); }
        #map-frame { height: 500px; border: 1px solid #333; margin-top: 10px; }
        #console { flex: 1; background: #000; color: var(--p); padding: 15px; overflow-y: auto; border: 1px solid #222; font-size: 14px; line-height: 1.5; }
        input { background: #000; color: var(--p); border: 1px solid var(--p); padding: 12px; margin-top: 10px; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="color:var(--p); text-shadow: 0 0 10px var(--p);">AEGIS-X</h2>
        <p style="font-size:10px; color:#555;">v1.2.0 | SOSNAC_SYSTEMS</p>
        <button class="btn active-btn" id="b-term" onclick="show('v-term')">[ TERMINAL ]</button>
        <button class="btn" id="b-sdr" onclick="show('v-sdr')">[ SPECTRUM ]</button>
        <button class="btn" id="b-map" onclick="show('v-map')">[ GEO-AUDIT ]</button>
    </div>

    <div id="v-term" class="view active">
        <h3 style="color:var(--sec)">>_ ROOT_ACCESS</h3>
        <div id="console">Initializing Aegis-X System Bridge... Done.<br>Awaiting hardware handshake...</div>
        <input type="text" id="cmd" placeholder="Enter Flipper or SDR command..." onkeypress="if(event.key=='Enter')runCmd()">
    </div>

    <div id="v-sdr" class="view">
        <h3 style="color:var(--sec)">~ SIGNAL_VISUALIZER</h3>
        <canvas id="sdrChart"></canvas>
        <button class="btn" style="width:200px; margin-top:20px;" onclick="triggerSweep()">START SWEEP</button>
    </div>

    <div id="v-map" class="view">
        <h3 style="color:var(--sec)">📍 GEOSPATIAL_HISTORY</h3>
        <div id="map-frame"></div>
    </div>

    <script>
        const API = ""; 

        function show(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active-btn'));
            document.getElementById(id).classList.add('active');
            document.getElementById('b-' + id.split('-')[1]).classList.add('active-btn');
            if(id === 'v-map') { setTimeout(() => map.invalidateSize(), 200); }
        }

        async function runCmd() {
            const i = document.getElementById('cmd');
            const c = document.getElementById('console');
            const cmd = i.value;
            c.innerHTML += `<div><span style="color:#fff">operator@aegis-x:~$</span> ${cmd}</div>`;
            
            try {
                const res = await fetch(`${API}/flipper/command?command=${encodeURIComponent(cmd)}`, {method:'POST'});
                const d = await res.json();
                c.innerHTML += `<div style="color:#888">${JSON.stringify(d.output || d)}</div>`;
            } catch(e) {
                c.innerHTML += `<div style="color:red">ERROR: Gateway Timeout</div>`;
            }
            i.value = '';
            c.scrollTop = c.scrollHeight;
        }

        // Map Setup
        const map = L.map('map-frame').setView([0,0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        async function loadMap() {
            const res = await fetch(`${API}/system/map-history`);
            const pts = await res.json();
            pts.forEach(p => L.marker([p.latitude, p.longitude]).addTo(map).bindPopup(`<b>${p.type}</b><br>${p.message}`));
        }
        loadMap();
    </script>
</body>
</html>
