<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis-X | Secure Web Command Center</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { 
            --p: #00ff41; /* Matrix Green */
            --bg: #050505; 
            --s: #111; 
            --sec: #ff0055; /* Cyber Pink */
            --border: #222;
        }
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Courier New', monospace; 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }
        
        /* Sidebar Navigation */
        .sidebar { 
            width: 240px; 
            border-right: 1px solid var(--p); 
            padding: 20px; 
            background: var(--s); 
            display: flex;
            flex-direction: column;
        }
        .sidebar h2 { 
            color: var(--p); 
            text-shadow: 0 0 10px var(--p); 
            margin-bottom: 5px;
        }
        .version-tag { font-size: 10px; color: #555; margin-bottom: 30px; letter-spacing: 1px; }

        .nav-btn { 
            display: block; 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; 
            background: none; 
            color: var(--p); 
            border: 1px solid var(--p); 
            cursor: pointer; 
            text-align: left; 
            font-weight: bold; 
            transition: 0.3s;
        }
        .nav-btn:hover, .nav-btn.active-btn { 
            background: var(--p); 
            color: #000; 
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.4); 
        }

        /* Main Content Viewports */
        .view { flex: 1; padding: 25px; display: none; overflow-y: auto; }
        .active { display: flex; flex-direction: column; }
        
        h3 { color: var(--sec); text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }

        #map-frame { height: 550px; border: 1px solid var(--border); margin-top: 10px; border-radius: 4px; }
        
        /* Terminal Styling */
        #console { 
            flex: 1; 
            background: #000; 
            color: var(--p); 
            padding: 20px; 
            overflow-y: auto; 
            border: 1px solid var(--border); 
            font-size: 14px; 
            line-height: 1.6;
            box-shadow: inset 0 0 10px #000;
        }
        .input-area { display: flex; margin-top: 15px; }
        input { 
            flex: 1;
            background: #000; 
            color: var(--p); 
            border: 1px solid var(--p); 
            padding: 15px; 
            font-family: monospace;
            outline: none;
        }
        .run-btn { background: var(--p); color: #000; border: none; padding: 0 25px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>AEGIS-X</h2>
        <div class="version-tag">SECURE_GATEWAY // v1.2.0 // SOSNAC</div>
        
        <button class="nav-btn active-btn" id="b-term" onclick="show('v-term')">[ TERMINAL ]</button>
        <button class="nav-btn" id="b-sdr" onclick="show('v-sdr')">[ SPECTRUM ]</button>
        <button class="nav-btn" id="b-map" onclick="show('v-map')">[ GEO-AUDIT ]</button>
    </div>

    <div id="v-term" class="view active">
        <h3>>_ ENCRYPTED_SHELL</h3>
        <div id="console">
            [SYSTEM] Initializing AES-256 Handshake...<br>
            [SYSTEM] SSL/TLS Session established on port 8443.<br>
            [READY] Awaiting operator input.<br>
        </div>
        <div class="input-area">
            <input type="text" id="cmd" placeholder="flipper_tx /ext/subghz/tesla.sub" onkeypress="if(event.key=='Enter')runCmd()">
            <button class="run-btn" onclick="runCmd()">EXEC</button>
        </div>
    </div>

    <div id="v-sdr" class="view">
        <h3>~ RF_VISUALIZER</h3>
        <div style="flex: 1; min-height: 400px;">
            <canvas id="sdrChart"></canvas>
        </div>
        <button class="nav-btn" style="width:200px; margin-top:20px;" onclick="triggerSweep()">TRIGGER SWEEP (2.4GHz)</button>
    </div>

    <div id="v-map" class="view">
        <h3>📍 GEOSPATIAL_HISTORY</h3>
        <div id="map-frame"></div>
    </div>

    <script>
        // --- SECURE API CONFIGURATION ---
        // window.location.origin automatically detects https://localhost:8443
        const API = window.location.origin;

        function show(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-btn'));
            document.getElementById(id).classList.add('active');
            document.getElementById('b-' + id.split('-')[1]).classList.add('active-btn');
            
            // Fix Leaflet sizing bug when container is hidden
            if(id === 'v-map') { 
                setTimeout(() => {
                    map.invalidateSize();
                    loadMap();
                }, 200); 
            }
        }

        async function runCmd() {
            const i = document.getElementById('cmd');
            const c = document.getElementById('console');
            const cmd = i.value;
            if(!cmd) return;

            c.innerHTML += `<div><span style="color:#fff">operator@aegis-x:~$</span> ${cmd}</div>`;
            i.value = '';

            try {
                const response = await fetch(`${API}/flipper/command?command=${encodeURIComponent(cmd)}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await response.json();
                c.innerHTML += `<div style="color:#888">${JSON.stringify(data.output || data)}</div>`;
            } catch(e) {
                c.innerHTML += `<div style="color:red">[!] ERROR: HTTPS Connection to Gateway Interrupted.</div>`;
            }
            c.scrollTop = c.scrollHeight;
        }

        // --- MAP LOGIC (Leaflet) ---
        const map = L.map('map-frame').setView([0,0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; CartoDB'
        }).addTo(map);

        async function loadMap() {
            try {
                const res = await fetch(`${API}/system/map-history`);
                const points = await res.json();
                points.forEach(p => {
                    if(p.latitude && p.longitude) {
                        L.marker([p.latitude, p.longitude])
                         .addTo(map)
                         .bindPopup(`<b>${p.type}</b><br>${p.message}`);
                    }
                });
            } catch(e) { console.error("Map fetch failed", e); }
        }

        // --- SDR CHART LOGIC ---
        // (Initializes an empty chart - logic to update data via triggerSweep)
        const ctx = document.getElementById('sdrChart').getContext('2d');
        const sdrChart = new Chart(ctx, {
            type: 'line',
            data: { 
                labels: ['2400', '2420', '2440', '2460', '2480', '2500'], 
                datasets: [{ 
                    label: 'dBm', 
                    data: [-95, -92, -88, -90, -94, -95], 
                    borderColor: '#00ff41',
                    borderWidth: 2,
                    tension: 0.4,
                    fill: true,
                    backgroundColor: 'rgba(0, 255, 65, 0.1)'
                }] 
            },
            options: { 
                maintainAspectRatio: false, 
                scales: { 
                    y: { beginAtZero: false, grid: { color: '#222' } },
                    x: { grid: { color: '#222' } }
                } 
            }
        });

        async function triggerSweep() {
            try {
                const res = await fetch(`${API}/sdr/sweep?start=2400&end=2500`);
                const data = await res.json();
                sdrChart.data.datasets[0].data = data.values;
                sdrChart.update();
            } catch(e) { alert("SDR Sweep API failed."); }
        }
    </script>
</body>
</html>
